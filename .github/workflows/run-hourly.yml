name: Review Scraper Bot

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:  # Allow manual runs

permissions:
  contents: write
  
jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Debug secrets (do not expose real values)
        run: |
         echo "OpenAI key length: ${#OPENAI_API_KEY}"
    echo "ClickUp token length: ${#CLICKUP_API_TOKEN}"
  env:
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: python review_bot.py

      - name: 💾 Commit updated seen_reviews.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main
          git add seen_reviews.txt
          git commit -m "Update seen reviews [skip ci]" || echo "No changes to commit"
          git push
