name: Review Scraper Bot

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Debug secrets (safe)
        run: |
          echo "OpenAI key length: ${#OPENAI_API_KEY}"
          echo "ClickUp token length: ${#CLICKUP_API_TOKEN}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}

      - name: ⚙️ Run review scraper bot
        run: python review_bot.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}

      - name: 💾 Commit updated seen_reviews.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git pull origin main

          # ✅ Only commit if file has changed
          if git diff --quiet seen_reviews.txt; then
            echo "🟢 No changes in seen_reviews.txt"
          else
            echo "🔄 Committing changes to seen_reviews.txt..."
            git add seen_reviews.txt
            git commit -m "Update seen reviews [skip ci]"
            git push
            echo "✅ seen_reviews.txt committed"
          fi
